# Build the Blockcast custom Talos kernel pkg: the STOCK Talos kernel with one
# config addition -- CONFIG_SYSTEM_TRUSTED_KEYS=<blockcast cert> -- so the kernel
# TRUSTS the Blockcast module-signing key. amt is NOT built in-tree; it ships as
# a separately-built, blockcast-signed Talos system extension (amt-kmod) that the
# deploy kernel accepts under module.sig_enforce=1 because of the trusted cert.
#
# Produces:
#   ghcr.io/blockcast/kernel:v1.13.4-amt   (vmlinuz whose trusted keyring embeds
#                                           the Blockcast signing cert; no amt
#                                           in-tree -- CONFIG_AMT is unset)
#
# This is Stage 1 of "Option (b): extension + persistent signing key"
# (design: ~/k8s/.planning/2026-06-17-amt-signed-talos-kernel-design.md).
#
# WHY a full kernel compile here:
#   `make kernel` runs the upstream siderolabs/pkgs kernel build (vanilla
#   linux-6.18.34 from cdn.kernel.org + Talos's vendored .config + patches +
#   clang/LLVM). That is a ~17 GB / ~40 min full compile. `ubuntu-latest`'s
#   ~14 GB rootfs OOMs mid-compile (root cause of the prior vanished-runner
#   failure, memory `talos-amt-kmod-self-contained-build`), so we run on the
#   on-prem `chromium-build` ARC scale set (dind, ~241 GB node ephemeral,
#   500 Gi CephFS per-pod volume, maxRunners=1). Org runner-group `default`
#   (visibility: all) makes `chromium-build` reachable from this fork.
#
# IMAGE TAG note (load-bearing):
#   the pkgs Makefile tags the kernel image `ghcr.io/$USERNAME/kernel:$(TAG)`
#   where TAG defaults to `git describe` (= v1.13.0-11-g969f61c on this branch).
#   To emit the intended `:v1.13.4-amt` ref we OVERRIDE `TAG=v1.13.4-amt`.
#   (IMAGE_TAG alone does NOT drive the kernel target tag — verified in Makefile.)

name: build-amt-kernel-pkg

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version tag (image tag suffix; e.g. v1.13.4)'
        required: false
        default: 'v1.13.4'
        type: string
      kver:
        description: 'Vanilla kernel.org base version this pkgs SHA builds (e.g. 6.18.34)'
        required: false
        default: '6.18.34'
        type: string
  push:
    branches:
      - blockcast-amt-1.13.4
    paths:
      - 'kernel/build/certs/**'
      - 'kernel/build/pkg.yaml'
      - 'kernel/build/config-amd64'
      - '.github/workflows/build-amt-kernel-pkg.yml'

concurrency:
  group: build-amt-kernel-pkg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: chromium-build
    timeout-minutes: 350
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout pkgs fork @ pinned SHA branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git describe` resolves (Makefile TAG)

      - name: Resolve build params (allow workflow_dispatch overrides)
        id: p
        env:
          IN_TALOS: ${{ inputs.talos_version }}
          IN_KVER: ${{ inputs.kver }}
        run: |
          set -euo pipefail
          TALOS="${IN_TALOS:-v1.13.4}"
          KVER="${IN_KVER:-6.18.34}"
          case "$TALOS" in v[0-9]*.[0-9]*.[0-9]*) : ;; *) echo "bad talos: $TALOS" >&2; exit 1 ;; esac
          case "$KVER"  in [0-9]*.[0-9]*.[0-9]*)  : ;; *) echo "bad kver: $KVER"  >&2; exit 1 ;; esac
          echo "talos=$TALOS" >> "$GITHUB_OUTPUT"
          echo "kver=$KVER"   >> "$GITHUB_OUTPUT"
          echo "image_tag=${TALOS}-amt-intree" >> "$GITHUB_OUTPUT"

      - name: Assert vendored config matches kver (fail-loud guard)
        env:
          KVER: ${{ steps.p.outputs.kver }}
        run: |
          set -euo pipefail
          # The vendored .config header carries the exact kernel version. If it
          # diverges from the target kver, the build's olddefconfig would
          # silently churn the config and poison MODVERSIONS CRCs (only caught
          # at node-load). Fail loudly here instead. Same guard the linux-amt
          # extension workflow uses.
          grep -q "Linux/x86 ${KVER} Kernel Configuration" \
            kernel/build/config-amd64 \
            || { echo "kernel/build/config-amd64 is not for kernel ${KVER}; re-pin the pkgs SHA / re-vendor" >&2; exit 1; }
          echo "config-amd64 header confirmed for kernel ${KVER}"

      - name: Assert in-tree amt config (CONFIG_AMT=m + trusted cert)
        run: |
          set -euo pipefail
          grep -q '^CONFIG_SYSTEM_TRUSTED_KEYS="certs/blockcast_signing_cert.pem"$' kernel/build/config-amd64 \
            || { echo "CONFIG_SYSTEM_TRUSTED_KEYS not set to the blockcast cert in config-amd64" >&2; exit 1; }
          # In-tree amt: CONFIG_AMT=m builds Blockcast's amt.c (patch 0006) inside
          # the kernel build, so amt.ko is auto-signed by the kernel's own build
          # key (CONFIG_MODULE_SIG_ALL) and its struct module ABI matches the
          # running kernel by construction -- no vanilla-vs-pkgs 0x4c0/0x500 drift.
          # REQUIRE the in-tree flip (the inverse of the old Option-B guard).
          grep -q '^CONFIG_AMT=m$' kernel/build/config-amd64 \
            || { echo "CONFIG_AMT=m missing -- in-tree amt flip not applied to config-amd64" >&2; exit 1; }
          test -f kernel/build/patches/0006-amt-blockcast-intree.patch \
            || { echo "0006-amt-blockcast-intree.patch missing" >&2; exit 1; }
          echo "in-tree amt config confirmed: CONFIG_AMT=m + 0006 patch + trusted cert"

      - name: Assert blockcast signing cert present + overlaid into kernel certs/
        run: |
          set -euo pipefail
          # Option B: the deploy kernel must TRUST the Blockcast module-signing
          # key. The public cert is committed and kernel/build/pkg.yaml copies it
          # into the kernel source's certs/ dir (cp -v /pkg/certs/* certs/) so
          # CONFIG_SYSTEM_TRUSTED_KEYS embeds it in the trusted keyring in vmlinuz.
          test -f kernel/build/certs/blockcast_signing_cert.pem \
            || { echo "kernel/build/certs/blockcast_signing_cert.pem missing" >&2; exit 1; }
          grep -q 'cp -v /pkg/certs/\* certs/' kernel/build/pkg.yaml \
            || { echo "kernel/build/pkg.yaml does not overlay /pkg/certs into the kernel certs/ dir" >&2; exit 1; }
          echo "blockcast signing cert present + overlaid into kernel certs/"

      - name: Resolve dind socket (ARC dind != /var/run/docker.sock)
        id: dind
        run: |
          set -euo pipefail
          # The ARC dind sidecar exposes Docker over a TCP/socket address in
          # $DOCKER_HOST (NOT the host /var/run/docker.sock). The pkgs Makefile
          # `docker buildx build` honours $DOCKER_HOST, so just surface it.
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset; falling back to default>}"
          docker version || { echo "docker daemon not reachable -- check dind sidecar / DOCKER_HOST" >&2; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to registry.blockcast.net (on-prem buildx cache)
        uses: docker/login-action@v3
        with:
          registry: registry.blockcast.net
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build + push kernel pkg (stock kernel; trusts blockcast cert)
        env:
          IMAGE_TAG: ${{ steps.p.outputs.image_tag }}
        run: |
          set -euo pipefail
          # TAG override is required: the pkgs Makefile tags the kernel image
          # ghcr.io/$USERNAME/kernel:$(TAG); default TAG = git describe. We want
          # the human-meaningful :v1.13.4-amt ref.
          # On-prem registry-backed buildx cache (registry.blockcast.net / Harbor,
          # authed above with the org HARBOR_* secrets) so the ~30min full kernel
          # compile is reused across runs with no external round-trip. CI_ARGS is
          # the pkgs Makefile pass-through appended to `docker buildx build`
          # (Makefile line ~196). NOTE: type=gha was rejected — the on-prem
          # gha-cache redirect is a Runner.Worker.dll patch baked only into the VM
          # runners, not the ARC `chromium-build` pod, so type=gha would hit
          # GitHub's external cache here. Registry cache needs no runner patch.
          CACHE=registry.blockcast.net/blockcast/amt-kernel-buildcache
          make kernel \
            PUSH=true \
            PLATFORM=linux/amd64 \
            REGISTRY=ghcr.io \
            USERNAME=blockcast \
            TAG="${IMAGE_TAG}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            CI_ARGS="--cache-from=type=registry,ref=${CACHE} --cache-to=type=registry,ref=${CACHE},mode=max"

      - name: Report published image
        env:
          IMAGE_TAG: ${{ steps.p.outputs.image_tag }}
        run: |
          echo "Published: ghcr.io/blockcast/kernel:${IMAGE_TAG}"
          echo "Next: run build-amt-installer.yml with PKG_KERNEL=ghcr.io/blockcast/kernel:${IMAGE_TAG}"
