# Compose the Blockcast custom Talos installer that consumes our custom kernel
# pkg (ghcr.io/blockcast/kernel:v1.13.2-amt). Produces:
#
#   ghcr.io/blockcast/installer:v1.13.2-amt
#
# Depends on build-amt-kernel-pkg.yml having published the kernel image first.
# Design: ~/k8s/.planning/2026-06-17-amt-signed-talos-kernel-design.md (Stage 2)
#
# BUILD GRAPH (the subtlety the design doc under-specified): Talos `make
# installer` does NOT build the installer from PKG_KERNEL directly. It composes
# the final installer by running the `imager` tool against a prebuilt
# `installer-base` image -- and the Makefile resolves BOTH under
# REGISTRY_AND_USERNAME (= ghcr.io/blockcast here). The custom kernel is baked
# into `installer-base` (its Dockerfile stage COPYs vmlinuz + /usr/lib/modules
# FROM ${PKG_KERNEL}); the `imager` is just the stock, version-matched compose
# tool and carries no kernel. So the job does three things:
#   (1) mirror the stock siderolabs imager under ghcr.io/blockcast/imager:<tag>
#       so `make installer`'s `docker pull` of it resolves,
#   (2) build + push the custom installer-base (stock rootfs + our kernel),
#   (3) `make installer`, which runs the imager (with -e GITHUB_TOKEN so it can
#       pull the PRIVATE installer-base) and crane-pushes the final installer.
# A first attempt that ran only `make installer PKG_KERNEL=...` failed at
# image-installer with "ghcr.io/blockcast/imager:... not found" (run 27705504057).
#
# Runner: the installer-base build COPYs a prebuilt kernel pkg (no kernel
# compile) and the compose is light, but we use `chromium-build` for consistency
# with build-amt-kernel-pkg and to guarantee a dind that can pull the (private)
# kernel/installer-base images with the job's GITHUB_TOKEN.

name: build-amt-installer

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'siderolabs/talos tag to check out (e.g. v1.13.2)'
        required: false
        default: 'v1.13.2'
        type: string
      pkgs_sha:
        description: 'PKGS pin Talos uses (e.g. v1.13.0-11-g969f61c)'
        required: false
        default: 'v1.13.0-11-g969f61c'
        type: string
      kernel_image:
        description: 'Custom kernel image ref from build-amt-kernel-pkg'
        required: false
        default: 'ghcr.io/blockcast/kernel:v1.13.2-amt'
        type: string

concurrency:
  group: build-amt-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  installer:
    runs-on: chromium-build
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve build params
        id: p
        env:
          IN_TALOS: ${{ inputs.talos_version }}
          IN_PKGS: ${{ inputs.pkgs_sha }}
          IN_KIMG: ${{ inputs.kernel_image }}
        run: |
          set -euo pipefail
          TALOS="${IN_TALOS:-v1.13.2}"
          PKGS="${IN_PKGS:-v1.13.0-11-g969f61c}"
          KIMG="${IN_KIMG:-ghcr.io/blockcast/kernel:v1.13.2-amt}"
          case "$TALOS" in v[0-9]*.[0-9]*.[0-9]*) : ;; *) echo "bad talos: $TALOS" >&2; exit 1 ;; esac
          echo "talos=$TALOS" >> "$GITHUB_OUTPUT"
          echo "pkgs=$PKGS"   >> "$GITHUB_OUTPUT"
          echo "kimg=$KIMG"   >> "$GITHUB_OUTPUT"
          echo "image_tag=${TALOS}-amt" >> "$GITHUB_OUTPUT"

      - name: Checkout siderolabs/talos @ tag
        uses: actions/checkout@v4
        with:
          repository: siderolabs/talos
          ref: ${{ steps.p.outputs.talos }}
          fetch-depth: 0

      - name: Resolve dind socket
        run: |
          set -euo pipefail
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset; default>}"
          docker version || { echo "docker daemon not reachable -- check dind / DOCKER_HOST" >&2; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install crane (required by talos `make installer`; not on the runner)
        run: |
          set -euo pipefail
          # Talos Makefile assumes `crane` on PATH (Makefile lists it as a
          # required tool, no bootstrap). Install the release binary into a
          # user-writable dir and prepend to PATH for subsequent steps.
          CRANE_VER="v0.20.2"
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VER}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" crane
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/crane" version || true

      - name: Login to ghcr (pull private kernel/installer-base + push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push installer (mirror imager -> installer-base w/ custom kernel -> installer)
        env:
          TALOS: ${{ steps.p.outputs.talos }}
          PKGS: ${{ steps.p.outputs.pkgs }}
          PKG_KERNEL: ${{ steps.p.outputs.kimg }}
          IMAGE_TAG: ${{ steps.p.outputs.image_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # (1) Mirror the stock siderolabs imager under our name+tag so that
          #     `make installer`'s `docker pull ghcr.io/blockcast/imager:<tag>`
          #     resolves. The imager carries no kernel -- it's the stock,
          #     version-matched compose tool, so a re-tag is faithful.
          docker pull "ghcr.io/siderolabs/imager:${TALOS}"
          docker tag  "ghcr.io/siderolabs/imager:${TALOS}" "ghcr.io/blockcast/imager:${IMAGE_TAG}"
          docker push "ghcr.io/blockcast/imager:${IMAGE_TAG}"

          # (2) Build + push the custom installer-base: stock v1.13.2 rootfs +
          #     our signed AMT kernel, injected via the PKG_KERNEL build-arg
          #     seam (COMMON_ARGS += --build-arg=PKG_KERNEL). buildx pulls the
          #     private kernel pkg using the daemon creds from the login step.
          make installer-base \
            PUSH=true \
            PLATFORM=linux/amd64 \
            REGISTRY=ghcr.io \
            USERNAME=blockcast \
            PKG_KERNEL="${PKG_KERNEL}" \
            PKGS="${PKGS}" \
            TAG="${IMAGE_TAG}"

          # (3) Compose + push the installer. `image-installer` pulls our imager
          #     and runs it with `-e GITHUB_TOKEN`, which the imager uses to pull
          #     the PRIVATE installer-base from ghcr; crane then pushes the per-
          #     arch tar and index-appends the final multi-arch tag:
          #     ghcr.io/blockcast/installer:${IMAGE_TAG}
          #
          # Pre-create the ARTIFACTS dir (_out) owned by the runner uid. The
          # imager runs `docker run --user $(id -u) -v $PWD/_out:/out ...`; if
          # _out is absent, the daemon auto-creates the bind-mount source as
          # ROOT and the imager (non-root) then fails with "permission denied"
          # writing installer-amd64.tar (observed run 27706173827).
          mkdir -p _out && chmod 0777 _out

          make installer \
            PUSH=true \
            PLATFORM=linux/amd64 \
            REGISTRY=ghcr.io \
            USERNAME=blockcast \
            PKG_KERNEL="${PKG_KERNEL}" \
            PKGS="${PKGS}" \
            TAG="${IMAGE_TAG}"

      - name: Report published image
        env:
          IMAGE_TAG: ${{ steps.p.outputs.image_tag }}
        run: |
          echo "Published: ghcr.io/blockcast/installer:${IMAGE_TAG}"
          echo "Next: Gate-4 canary on k8s-data-2 with install.image=ghcr.io/blockcast/installer:${IMAGE_TAG}"
